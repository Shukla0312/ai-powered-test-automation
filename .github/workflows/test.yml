name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  ai-validation:
    runs-on: ubuntu-latest

    env:
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
      USE_MOCK_AI: ${{ vars.USE_MOCK_AI || 'true' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-3.5-turbo' }}
      OPENAI_TEMPERATURE: ${{ vars.OPENAI_TEMPERATURE || '0.3' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5-20250929' }}
      ANTHROPIC_TEMPERATURE: ${{ vars.ANTHROPIC_TEMPERATURE || '0.3' }}
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
      API_TIMEOUT: ${{ vars.API_TIMEOUT || '30000' }}
      MAX_RETRIES: ${{ vars.MAX_RETRIES || '3' }}
      RETRY_DELAY_MS: ${{ vars.RETRY_DELAY_MS || '1000' }}
      FLAKY_TEST_THRESHOLD: ${{ vars.FLAKY_TEST_THRESHOLD || '0.3' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run unit tests with JSON reporter
        run: npm run test:unit:json

      - name: Run integration scenario pack
        run: npm run test:integration

      - name: Run integration scenario pack with JSON reporter
        run: npm run test:integration:json

      - name: Run AI validation tests
        run: npm test

      - name: Generate machine-readable test artifacts
        run: |
          npm run test:unit:json
          npm run test:integration:json
          npm run test:mock:json

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-artifacts
          path: reports/
